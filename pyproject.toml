[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "mof-guest-toolkit"
version = "0.1.0"
description = "Helper tools for MOF-guest computational chemistry workflows"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "numpy",
    "matplotlib",
    "pubchempy",
    "flask",
]

[project.scripts]
pubchem_interactive   = "mof_toolkit.pubchem:pubchem_interactive_cli"
pubchem_check_prop    = "mof_toolkit.pubchem:pubchem_check_prop_cli"
rdkit_default_props   = "mof_toolkit.pubchem:rdkit_default_props_cli"
pubchem_batch_fetcher = "mof_toolkit.pubchem:pubchem_batch_fetcher_cli"
fetch_xyz_batch       = "mof_toolkit.pubchem:fetch_xyz_batch_cli"
smiles_to_3d          = "mof_toolkit.molecule_manager:smiles_to_3d_cli"

# Future modules (uncomment as you implement them)
# get_cif_ccdc        = "mof_toolkit.ccdc:get_cif_ccdc_cli"
# extract_geom        = "mof_toolkit.geometry_opt:extract_geom_cli"
# analyze_modes       = "mof_toolkit.normal_modes:analyze_modes_cli"
